<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="clock-layout">
    <section class="clock">
      <div class="clock__viewport">
        <ul class="clock__list" id="list" aria-live="polite" aria-label="Current time and values"></ul>
      </div>
    </section>
    <aside class="day-list" aria-label="All seconds">
      <div class="day-list__viewport" id="day-scroll">
        <div class="day-list__content" id="day-scroll-content"></div>
      </div>
    </aside>
  </main>
  <script src="app.js"></script>
</body>
</html>
